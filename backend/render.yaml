services:
  - type: web
    name: campaignx-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CAMPAIGNX_BASE_URL
        value: https://campaignx.inxiteout.ai
      - key: CAMPAIGNX_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MAX_ITERATIONS
        value: "3"